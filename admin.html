<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>STAR STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Cairo';background:#fafafa;margin:0}
header{display:flex;justify-content:space-between;padding:15px;background:#fff;border-bottom:1px solid #eee}
.logo{font-weight:bold}
.cart{cursor:pointer;background:#000;color:#fff;padding:8px 15px;border-radius:20px}
.container{display:flex}
aside{width:200px;background:#fff;padding:15px;height:100vh}
main{flex:1;padding:20px}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}
.card{background:#fff;border:1px solid #eee;border-radius:10px;overflow:hidden}
.card img{width:100%;height:200px;object-fit:cover}
.card .info{padding:10px}
.btn{background:#000;color:#fff;width:100%;padding:8px;border:none;cursor:pointer}
li{cursor:pointer;margin:8px 0}
</style>
</head>

<body>

<header>
<div class="logo">STAR STORE</div>
<div class="cart">🛒 السلة</div>
</header>

<div class="container">

<aside>
<h3>الأقسام</h3>
<ul>
<li onclick="filterCat('all')">كل المنتجات</li>
<li onclick="filterCat('شنط')">شنط</li>
<li onclick="filterCat('ملابس حريمي')">ملابس حريمي</li>
<li onclick="filterCat('ملابس رجالي')">ملابس رجالي</li>
<li onclick="filterCat('إكسسوارات')">إكسسوارات</li>
<li onclick="filterCat('أحذية')">أحذية</li>
</ul>
</aside>

<main>
<div class="product-grid" id="grid"></div>
</main>

</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCp7tHQKY8Kd0WO0Stn3XKItstO96mJlW4",
authDomain: "starshop-8e111.firebaseapp.com",
projectId: "starshop-8e111",
storageBucket: "starshop-8e111.firebasestorage.app",
messagingSenderId: "288475912502",
appId: "1:288475912502:web:bc6281e245c7cdea9b3b97"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allProducts = [];

function render(list){
const box = document.getElementById("grid");
box.innerHTML = "";

list.forEach(p=>{
box.innerHTML += `
<div class="card">
<img src="${p.image}">
<div class="info">
<h4>${p.name}</h4>
<p>${p.price} ج.م</p>
</div>
</div>`;
});
}

// realtime
onSnapshot(collection(db,"products"),(snap)=>{
allProducts = [];
snap.forEach(d=>{
allProducts.push(d.data());
});
render(allProducts);
});

// filter
window.filterCat = function(cat){
if(cat==="all") render(allProducts);
else render(allProducts.filter(p=>p.category===cat));
}

</script>

</body>
</html>
