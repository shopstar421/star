<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة STAR STORE</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: #f8f9fa; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; }
        .btn-add { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        .btn-sold { background: #f39c12; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>إدارة منتجات STAR STORE</h2>
    <form id="productForm">
        <div class="form-grid">
            <input type="text" id="pName" placeholder="اسم المنتج" required>
            <input type="number" id="pPrice" placeholder="السعر" required>
            <select id="pCat">
                <option>إكسسوارات</option><option>شنط</option><option>نضارات</option><option>ملابس أطفال</option>
                <option>ملابس حريمي</option><option>ملابس رجالي</option><option>أحذية</option><option>مستحضرات تجميل</option>
            </select>
            <input type="file" id="pImage" accept="image/*" required>
        </div>
        <button type="submit" class="btn-add">نشر المنتج في الموقع</button>
    </form>
    <table>
        <thead><tr><th>الصورة</th><th>الاسم</th><th>السعر</th><th>الحالة</th><th>تحكم</th></tr></thead>
        <tbody id="adminList"></tbody>
    </table>
</div>

<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCp7tHQKY8Kd0WO0Stn3XKitstO96mJlW4",
        authDomain: "://firebaseapp.com",
        databaseURL: "https://firebaseio.com",
        projectId: "starshop-8e111",
        storageBucket: "starshop-8e111.firebasestorage.app",
        messagingSenderId: "288475912502",
        appId: "1:288475912502:web:bc6281e245c7cdea9b3b97"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let products = [];
    db.ref('products').on('value', (s) => {
        products = s.val() || [];
        render();
    });

    function render() {
        const list = document.getElementById('adminList');
        list.innerHTML = "";
        products.forEach((p, i) => {
            list.innerHTML += `<tr>
                <td><img src="${p.image}" width="50"></td>
                <td>${p.name}</td>
                <td>${p.price}</td>
                <td>${p.soldOut ? 'نفذت' : 'متوفر'}</td>
                <td>
                    <button class="btn-sold" onclick="toggle(${i})">حالة</button>
                    <button class="btn-del" onclick="del(${i})">حذف</button>
                </td>
            </tr>`;
        });
    }

    document.getElementById('productForm').onsubmit = function(e) {
        e.preventDefault();
        const reader = new FileReader();
        reader.onload = function(event) {
            products.push({
                id: Date.now().toString(),
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                category: document.getElementById('pCat').value,
                image: event.target.result,
                soldOut: false
            });
            db.ref('products').set(products);
            alert("تمت الإضافة!");
        };
        reader.readAsDataURL(document.getElementById('pImage').files[0]);
    };

    function del(i) { if(confirm("حذف؟")) { products.splice(i,1); db.ref('products').set(products); } }
    function toggle(i) { products[i].soldOut = !products[i].soldOut; db.ref('products').set(products); }
</script>
</body>
</html>
