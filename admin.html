<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة STAR STORE</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: #f8f9fa; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; outline: none; }
        .btn-add { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        .btn-sold { background: #f39c12; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>إدارة منتجات STAR STORE</h2>
    <form id="productForm">
        <div class="form-grid">
            <div><label>اسم المنتج</label><input type="text" id="pName" required></div>
            <div><label>كود المنتج</label><input type="text" id="pCode" placeholder="مثلاً: A101" required></div>
            <div><label>السعر (ج.م)</label><input type="number" id="pPrice" required></div>
            <div>
                <label>القسم</label>
                <select id="pCat">
                    <option>إكسسوارات</option><option>شنط</option><option>نضارات</option><option>ملابس أطفال</option>
                    <option>ملابس حريمي</option><option>ملابس رجالي</option><option>أحذية</option><option>مستحضرات تجميل</option>
                </select>
            </div>
            <div style="grid-column: span 2;"><label>صورة المنتج</label><input type="file" id="pImage" accept="image/*" required></div>
        </div>
        <button type="submit" class="btn-add">إضافة المنتج الآن</button>
    </form>
    <table>
        <thead><tr><th>الصورة</th><th>الاسم</th><th>الكود</th><th>الحالة</th><th>التحكم</th></tr></thead>
        <tbody id="adminList"></tbody>
    </table>
</div>

<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCp7tHQKY8Kd0WO0Stn3XKitstO96mJlW4",
        authDomain: "://firebaseapp.com",
        databaseURL: "https://firebaseio.com",
        projectId: "starshop-8e111",
        storageBucket: "starshop-8e111.firebasestorage.app",
        messagingSenderId: "288475912502",
        appId: "1:288475912502:web:bc6281e245c7cdea9b3b97"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let products = [];
    db.ref('products').on('value', (s) => {
        products = s.val() || [];
        render();
    });

    function render() {
        const list = document.getElementById('adminList'); list.innerHTML = "";
        products.forEach((p, i) => {
            list.innerHTML += `<tr>
                <td><img src="${p.image}" width="50" height="50" style="object-fit:cover; border-radius:5px;"></td>
                <td>${p.name}</td>
                <td>${p.code}</td>
                <td style="color:${p.soldOut?'red':'green'}">${p.soldOut?'نفذت':'متوفر'}</td>
                <td>
                    <button class="btn-sold" onclick="toggleSold(${i})">حالة</button>
                    <button class="btn-del" onclick="deleteProduct(${i})">حذف</button>
                </td>
            </tr>`;
        });
    }

    document.getElementById('productForm').onsubmit = function(e) {
        e.preventDefault();
        const file = document.getElementById('pImage').files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            // ضغط بسيط للصورة
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 400; canvas.height = (img.height/img.width)*400;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                products.push({
                    id: Date.now().toString(),
                    name: document.getElementById('pName').value,
                    code: document.getElementById('pCode').value,
                    price: parseInt(document.getElementById('pPrice').value),
                    category: document.getElementById('pCat').value,
                    image: canvas.toDataURL('image/jpeg', 0.7),
                    soldOut: false
                });
                db.ref('products').set(products).then(() => {
                    alert("تمت الإضافة بنجاح!");
                    document.getElementById('productForm').reset();
                });
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    function deleteProduct(i) { if(confirm("حذف؟")) { products.splice(i,1); db.ref('products').set(products); } }
    function toggleSold(i) { products[i].soldOut = !products[i].soldOut; db.ref('products').set(products); }
</script>
</body>
</html>
