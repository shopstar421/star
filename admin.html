<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة STAR STORE</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f4f4; padding: 20px; direction: rtl; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn-add { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 5px; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <h2>إضافة منتج (لوحة التحكم)</h2>
    <form id="pForm">
        <div class="form-grid">
            <input type="text" id="pName" placeholder="اسم المنتج" required>
            <input type="text" id="pCode" placeholder="كود المنتج (مثلاً A1)" required>
            <input type="number" id="pPrice" placeholder="السعر" required>
            <select id="pCat">
                <option>إكسسوارات</option><option>شنط</option><option>نضارات</option>
                <option>ملابس أطفال</option><option>ملابس حريمي</option>
            </select>
        </div>
        <input type="file" id="pImage" accept="image/*" required>
        <button type="submit" class="btn-add">إضافة للموقع الآن</button>
    </form>
    <table id="adminTable">
        <thead><tr><th>الصورة</th><th>الاسم</th><th>الكود</th><th>حذف</th></tr></thead>
        <tbody id="adminList"></tbody>
    </table>
</div>

<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>
<script>
    // طلب الباسورد فوراً عند التحميل
    let pass = prompt("أدخل كلمة المرور:");
    if (pass !== "mmaahh123") {
        alert("خطأ!");
        window.location.href = "index.html";
    }

    const firebaseConfig = {
        apiKey: "AIzaSyCp7tHQKY8Kd0WO0Stn3XKitstO96mJlW4",
        databaseURL: "https://starshop-8e111-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // جلب وعرض البيانات
    db.ref('products').on('value', (s) => {
        const list = document.getElementById('adminList');
        list.innerHTML = "";
        const data = s.val() || {};
        Object.keys(data).forEach(key => {
            const p = data[key];
            list.innerHTML += `<tr>
                <td><img src="${p.image}" width="40"></td>
                <td>${p.name}</td>
                <td>${p.code}</td>
                <td><button class="btn-del" onclick="deleteP('${key}')">حذف</button></td>
            </tr>`;
        });
    });

    // الإضافة
    document.getElementById('pForm').onsubmit = function(e) {
        e.preventDefault();
        const reader = new FileReader();
        reader.onload = function(ev) {
            const newP = {
                name: document.getElementById('pName').value,
                code: document.getElementById('pCode').value,
                price: document.getElementById('pPrice').value,
                category: document.getElementById('pCat').value,
                image: ev.target.result,
                id: Date.now().toString()
            };
            db.ref('products').push(newP).then(() => {
                alert("تمت الإضافة!");
                document.getElementById('pForm').reset();
            });
        };
        reader.readAsDataURL(document.getElementById('pImage').files[0]);
    };

    function deleteP(key) { if(confirm("حذف؟")) db.ref('products').child(key).remove(); }
</script>
</body>
</html>
