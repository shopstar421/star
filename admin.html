<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
body{font-family:Cairo;background:#eee;padding:20px}
.box{max-width:700px;margin:auto;background:#fff;padding:20px}
input{width:100%;padding:10px;margin:5px 0}
button{width:100%;padding:10px;background:#000;color:#fff;border:none}
table{width:100%;margin-top:20px}
td{padding:10px;text-align:center;border-bottom:1px solid #ddd}
</style>
</head>

<body>

<div class="box">

<h2>إضافة منتج</h2>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input id="image" placeholder="رابط الصورة">

<button onclick="addProduct()">إضافة</button>

<table>
<tbody id="list"></tbody>
</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCp7tHQKY8Kd0WO0Stn3XKItstO96mJlW4",
authDomain: "starshop-8e111.firebaseapp.com",
projectId: "starshop-8e111",
storageBucket: "starshop-8e111.firebasestorage.app",
messagingSenderId: "288475912502",
appId: "1:288475912502:web:bc6281e245c7cdea9b3b97"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// add
window.addProduct = async function(){

await addDoc(collection(db,"products"),{
name: name.value,
price: price.value,
image: image.value,
createdAt: Date.now()
});

alert("تمت الإضافة");
}

// list
onSnapshot(collection(db,"products"), snap=>{
const list = document.getElementById("list");
list.innerHTML = "";

snap.forEach(d=>{
let p = d.data();

list.innerHTML += `
<tr>
<td>${p.name}</td>
<td>${p.price}</td>
<td><button onclick="del('${d.id}')">حذف</button></td>
</tr>`;
});
});

// delete
window.del = async function(id){
await deleteDoc(doc(db,"products",id));
}

</script>

</body>
</html>
