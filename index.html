<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAR STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:#fcfcfc;color:#333}
header{background:#fff;padding:15px 5%;display:flex;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid #eee}
.logo{font-weight:bold;font-size:22px}
.cart-icon{background:#000;color:#fff;padding:8px 15px;border-radius:20px;cursor:pointer}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;padding:20px}
.product-card{background:#fff;border:1px solid #eee;border-radius:10px;overflow:hidden}
.product-card img{width:100%;height:250px;object-fit:cover}
.product-info{padding:10px}
.btn{width:100%;padding:10px;background:#000;color:#fff;border:none;cursor:pointer;margin-top:10px}
</style>
</head>

<body>

<header>
<div class="logo">STAR STORE</div>
<div class="cart-icon" onclick="toggleCart()">🛒 <span id="cartCount">0</span></div>
</header>

<div class="product-grid" id="products"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCp7tHQKY8Kd0WO0Stn3XKItstO96mJlW4",
authDomain: "starshop-8e111.firebaseapp.com",
projectId: "starshop-8e111",
storageBucket: "starshop-8e111.firebasestorage.app",
messagingSenderId: "288475912502",
appId: "1:288475912502:web:bc6281e245c7cdea9b3b97"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = [];

function renderProducts(list){
const box = document.getElementById("products");
box.innerHTML = "";

list.forEach(p=>{
box.innerHTML += `
<div class="product-card">
<img src="${p.image}">
<div class="product-info">
<h4>${p.name}</h4>
<p>${p.price} ج.م</p>
<button class="btn" onclick="addToCart('${p.name}',${p.price})">
أضف للسلة
</button>
</div>
</div>`;
});
}

window.addToCart = function(name,price){
cart.push({name,price});
document.getElementById("cartCount").innerText = cart.length;
}

window.toggleCart = function(){
alert("عدد المنتجات: " + cart.length);
}

onSnapshot(collection(db,"products"),(snap)=>{
let arr=[];
snap.forEach(doc=>{
arr.push(doc.data());
});
renderProducts(arr);
});
</script>

</body>
</html>
