<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin STAR STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Cairo';background:#f5f5f5;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:10px}
input,select{width:100%;padding:10px;margin:5px 0}
button{width:100%;padding:10px;background:#000;color:#fff;border:none;cursor:pointer}
table{width:100%;margin-top:20px}
td,th{text-align:center;padding:10px;border-bottom:1px solid #eee}
</style>
</head>

<body>

<div class="container">

<h2>لوحة التحكم</h2>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input id="image" placeholder="رابط الصورة">
<select id="category">
<option>شنط</option>
<option>ملابس حريمي</option>
<option>ملابس رجالي</option>
<option>إكسسوارات</option>
<option>أحذية</option>
</select>

<button onclick="addProduct()">إضافة منتج</button>

<table>
<thead>
<tr>
<th>الاسم</th>
<th>السعر</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCp7tHQKY8Kd0WO0Stn3XKItstO96mJlW4",
authDomain: "starshop-8e111.firebaseapp.com",
projectId: "starshop-8e111",
storageBucket: "starshop-8e111.firebasestorage.app",
messagingSenderId: "288475912502",
appId: "1:288475912502:web:bc6281e245c7cdea9b3b97"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// add
window.addProduct = async function(){

await addDoc(collection(db,"products"),{
name:document.getElementById("name").value,
price:document.getElementById("price").value,
image:document.getElementById("image").value,
category:document.getElementById("category").value
});

alert("تمت الإضافة");
}

// list
onSnapshot(collection(db,"products"),(snap)=>{
const list=document.getElementById("list");
list.innerHTML="";

snap.forEach(d=>{
let p=d.data();

list.innerHTML += `
<tr>
<td>${p.name}</td>
<td>${p.price}</td>
<td><button onclick="del('${d.id}')">حذف</button></td>
</tr>`;
});
});

// delete
window.del = async function(id){
await deleteDoc(doc(db,"products",id));
}

</script>

</body>
</html>
