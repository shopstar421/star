<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAR STORE</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #fcfcfc; direction: rtl; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; border: 1px solid #eee; text-align: center; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        .price { font-weight: bold; color: #27ae60; margin: 10px 0; }
    </style>
</head>
<body>
    <h1 style="text-align:center; margin-bottom:30px;">STAR STORE</h1>
    <div class="grid" id="display">جاري التحميل...</div>

    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCp7tHQKY8Kd0WO0Stn3XKitstO96mJlW4",
            databaseURL: "https://starshop-8e111-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('products').on('value', (s) => {
            const display = document.getElementById('display');
            display.innerHTML = "";
            const data = s.val() || {};
            const items = Object.values(data);
            if (items.length === 0) { display.innerHTML = "لا توجد منتجات حالياً."; return; }
            
            items.forEach(p => {
                display.innerHTML += `
                <div class="card">
                    <img src="${p.image}">
                    <h3>${p.name}</h3>
                    <p>كود: ${p.code}</p>
                    <div class="price">${p.price} ج.م</div>
                </div>`;
            });
        });
    </script>
</body>
</html>
