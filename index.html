<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAR STORE | المتجر الرسمي</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: #fcfcfc; color: #333; overflow-x: hidden; }
        header { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 26px; font-weight: 800; letter-spacing: 3px; color: #000; text-decoration: none; }
        .cart-icon { position: relative; cursor: pointer; font-size: 16px; font-weight: 600; background: #000; color: #fff; padding: 8px 18px; border-radius: 25px; }
        .cart-count { position: absolute; top: -5px; right: -5px; background: #e74c3c; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; }
        .main-wrapper { display: flex; padding: 30px 5%; max-width: 1400px; margin: 0 auto; gap: 30px; }
        aside { width: 220px; flex-shrink: 0; }
        .filter-section h4 { margin-bottom: 15px; font-size: 16px; border-bottom: 2px solid #000; display: inline-block; padding-bottom: 5px; }
        .filter-section ul { list-style: none; }
        .filter-section ul li { margin-bottom: 12px; cursor: pointer; font-size: 14px; color: #666; transition: 0.3s; }
        .filter-section ul li:hover { color: #000; font-weight: 600; }
        .content { flex-grow: 1; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .product-card { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; position: relative; }
        .product-img { width: 100%; height: 320px; background: #f9f9f9; position: relative; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 15px; }
        .btn-add-cart { width: 100%; background: #000; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: 600; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 550px; max-height: 90vh; overflow-y: auto; }
        .cart-item { display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 12px 0; gap: 15px; }
        .cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
        .qty-controls { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        .qty-btn { background: #eee; border: none; width: 25px; height: 25px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .checkout-form input, .checkout-form select, .checkout-form textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .sold-out-badge { position: absolute; top: 10px; left: 10px; background: #ff4d4d; color: white; padding: 5px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; z-index: 5; }
        .wa-sidebar-link { color: #25d366; text-decoration: none; font-weight: bold; font-size: 14px; display: block; margin-top: 10px; }
        @media (max-width: 768px) { .main-wrapper { flex-direction: column; } aside { width: 100%; } }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">STAR</a>
        <div class="cart-icon" onclick="toggleCart()">🛒 السلة <span class="cart-count" id="cart-count">0</span></div>
    </header>

    <div class="main-wrapper">
        <aside>
            <div class="filter-section">
                <h4>الأقسام</h4>
                <ul>
                    <li onclick="filterProducts('all')">عرض الكل</li>
                    <li onclick="filterProducts('إكسسوارات')">إكسسوارات</li>
                    <li onclick="filterProducts('شنط')">شنط</li>
                    <li onclick="filterProducts('نضارات')">نضارات</li>
                    <li onclick="filterProducts('ملابس أطفال')">ملابس أطفال</li>
                    <li onclick="filterProducts('ملابس حريمي')">ملابس حريمي</li>
                    <li onclick="filterProducts('ملابس رجالي')">ملابس رجالي</li>
                    <li onclick="filterProducts('أحذية')">أحذية</li>
                    <li onclick="filterProducts('مستحضرات تجميل')">مستحضرات تجميل</li>
                </ul>
                <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px;">
                    <a href="https://wa.me" target="_blank" class="wa-sidebar-link">🟢 واتساب الدعم</a>
                </div>
            </div>
        </aside>

        <main class="content">
            <h2 id="view-title" style="margin-bottom: 25px; font-size: 22px;">أحدث الموديلات</h2>
            <div class="product-grid" id="product-display">جاري التحميل...</div>
        </main>
    </div>

    <div class="modal" id="cartModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px; border-bottom: 2px solid #000;">سلة المشتريات</h3>
            <div id="cart-items-list"></div>
            <div style="background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top:15px; display:flex; justify-content: space-between; font-weight: bold;">
                <span>الإجمالي:</span>
                <span><span id="total-price">0</span> ج.م</span>
            </div>
            <form class="checkout-form" id="orderForm">
                <input type="text" id="custName" placeholder="الاسم الكامل" required>
                <input type="tel" id="custPhone" placeholder="رقم الهاتف" required>
                <input type="text" id="custAddr" placeholder="العنوان بالتفصيل" required>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" class="btn-add-cart" style="background: #eee; color: #333;" onclick="toggleCart()">إغلاق</button>
                    <button type="submit" class="btn-add-cart">تأكيد عبر واتساب</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCp7tHQKY8Kd0WO0Stn3XKitstO96mJlW4",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "starshop-8e111",
            storageBucket: "starshop-8e111.firebasestorage.app",
            messagingSenderId: "288475912502",
            appId: "1:288475912502:web:bc6281e245c7cdea9b3b97"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [];
        let cart = JSON.parse(localStorage.getItem('STAR_CART')) || [];

        db.ref('products').on('value', (s) => {
            allProducts = s.val() || [];
            filterProducts('all');
        });

        function filterProducts(cat) {
            const display = document.getElementById('product-display');
            display.innerHTML = "";
            const filtered = cat === 'all' ? allProducts : allProducts.filter(p => p.category === cat);
            filtered.forEach(p => {
                display.innerHTML += `
                    <div class="product-card">
                        ${p.soldOut ? '<div class="sold-out-badge">نفذت</div>' : ''}
                        <div class="product-img"><img src="${p.image}" style="${p.soldOut ? 'opacity:0.5' : ''}"></div>
                        <div class="product-info">
                            <h3 style="font-size:14px">${p.name} <small style="color:#888">(${p.code})</small></h3>
                            <p style="font-weight:bold">${p.price} ج.م</p>
                            <button class="btn-add-cart" ${p.soldOut ? 'disabled' : `onclick="addToCart('${p.id}')"`}>${p.soldOut ? 'غير متوفر' : 'أضف للسلة'}</button>
                        </div>
                    </div>`;
            });
            document.getElementById('view-title').innerText = cat === 'all' ? 'أحدث الموديلات' : cat;
            updateUI();
        }

        function addToCart(id) {
            const p = allProducts.find(x => x.id === id);
            const item = cart.find(x => x.id === id);
            if(item) item.qty++; else cart.push({...p, qty: 1});
            localStorage.setItem('STAR_CART', JSON.stringify(cart));
            updateUI();
            alert("تمت الإضافة!");
        }

        function updateUI() {
            const list = document.getElementById('cart-items-list');
            let total = 0; let count = 0; list.innerHTML = "";
            cart.forEach((item, i) => {
                total += item.price * item.qty; count += item.qty;
                list.innerHTML += `<div class="cart-item">
                    <img src="${item.image}">
                    <div style="flex-grow:1"><h4>${item.name}</h4><p>${item.price} ج.م</p></div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="changeQty(${i},-1)">-</button>
                        <span>${item.qty}</span>
                        <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
                    </div>
                </div>`;
            });
            document.getElementById('cart-count').innerText = count;
            document.getElementById('total-price').innerText = cart.length > 0 ? (total + 70) : 0;
        }

        function changeQty(i, d) {
            cart[i].qty += d; if(cart[i].qty < 1) cart.splice(i,1);
            localStorage.setItem('STAR_CART', JSON.stringify(cart)); updateUI();
        }

        function toggleCart() { const m = document.getElementById('cartModal'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }

        document.getElementById('orderForm').onsubmit = function(e) {
            e.preventDefault();
            let msg = `طلب جديد:\n`;
            cart.forEach(i => msg += `- ${i.name} (كود:${i.code}) (كمية:${i.qty})\n`);
            msg += `\nالإجمالي: ${document.getElementById('total-price').innerText} ج.م\nالاسم: ${document.getElementById('custName').value}\nالعنوان: ${document.getElementById('custAddr').value}`;
            window.open(`https://wa.me?text=${encodeURIComponent(msg)}`, '_blank');
        };
    </script>
</body>
</html>
