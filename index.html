<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>STAR STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
body{font-family:Cairo;background:#f7f7f7;margin:0}
header{background:#fff;padding:15px;display:flex;justify-content:space-between}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px;padding:20px}
.card{background:#fff;border-radius:10px;overflow:hidden}
.card img{width:100%;height:200px;object-fit:cover}
.info{padding:10px}
</style>
</head>

<body>

<header>
<div>STAR STORE</div>
</header>

<div class="grid" id="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCp7tHQKY8Kd0WO0Stn3XKItstO96mJlW4",
authDomain: "starshop-8e111.firebaseapp.com",
projectId: "starshop-8e111",
storageBucket: "starshop-8e111.firebasestorage.app",
messagingSenderId: "288475912502",
appId: "1:288475912502:web:bc6281e245c7cdea9b3b97"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const grid = document.getElementById("grid");

onSnapshot(collection(db,"products"), snap=>{
grid.innerHTML = "";

snap.forEach(doc=>{
let p = doc.data();

grid.innerHTML += `
<div class="card">
<img src="${p.image}">
<div class="info">
<h4>${p.name}</h4>
<p>${p.price} ج.م</p>
</div>
</div>`;
});
});

</script>

</body>
</html>
